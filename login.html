<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,white,#ff9f43);
}

#frm{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
color:rgb(7, 15, 255);
animation:fadeIn 0.8s ease-in-out;
}

h3{
margin-bottom:20px;
font-size:24px;
}

input, select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
}

#button{
background:rgb(6, 39, 249);
color:#ff4757;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

#button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(3, 248, 93, 0.3);
}

.signup-text{
margin-top:15px;
}

.signup-text a{
color:white;
font-weight:bold;
text-decoration:underline;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}

</style>
<body>
   <div id="frm">
<h3 style="width: auto;background-color: rgb(0, 255, 76);" >Login form</h3>

<form id="loginForm">
<label for="UserName">UserName</label>
<input type="text"
id="loginUsername"
placeholder="Username"
required>
<label for="password">Password</label>
<input type="password"
id="loginPassword"
placeholder="Password"
required>
<label for="Email">EmailAddress</label>
<input type="text"
id="loginEmailaddress"
placeholder="EmailAddress"
required>

<input type="submit" id="button" value="LOGIN">
</form>

<p class="signup-text">
Don't have an account? <a href="signup.html">Signup</a>
</p>

</div> 
    
</body>
</html>
